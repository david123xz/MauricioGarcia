<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/css/paginaprincipal.css">
</head>

<body>

  <div class="app">

    <aside class="sidebar">
      <h3>Usuarios</h3>
      <ul id="listaUsuarios"></ul>

      <div class="areaUsuario">
        <button id="btnConfiguracion">Configuracion</button>
        <button id="btnCerrarSesion">Cerrar Sesión</button>
      </div>
    </aside>

    <main class="chat">

      <h3 id="chatTitulo">Chat</h3>

      <div class="chat-vacio" id="chatVacio">CHAT</div>
      <div class="mensajes" id="contenedorMensajes"></div>

      <div class="input-area">
        <input id="inputMensaje" type="text" placeholder="Escribe un mensaje..." />
        <button id="btnEnviar">Enviar</button>
      </div>

    </main>

  </div>
  <script src="/js/paginaprincipal.js"></script>
</body>
</html>
